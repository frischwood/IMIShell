; IMIShell - MeteoIO processing configuration
;
; Used with meteoio_timeseries: downloads IMIS stations from the SLF DBO
; database (VPN required), applies the same filtering/resampling/gap-filling
; as the snowpack engine (spConfig.ini), and writes clean SMET timeseries.
;
; STATION# keys and the METEOPATH are injected at run time by IMIShell.

[Input]
COORDSYS = CH1903+
TIME_ZONE = 1

METEO = DBO
DBO_URL = https://pgdata.int.slf.ch
DBO_DEBUG = TRUE

USE_IMIS_PSUM = TRUE
USE_SNOWPACK_PSUM = TRUE

[INPUTEDITING]
*::KEEP = HS TA RH PSUM ISWR RSWR ILWR VW DW

[Output]
COORDSYS = CH1903+
TIME_ZONE = 1

METEO = SMET
METEOPATH = ./meteo

[Filters]
PSUM::filter1 = min
PSUM::arg1::soft = true
PSUM::arg1::min = 0.0

TA::filter1 = min_max
TA::arg1::min = 240
TA::arg1::max = 320

RH::filter1 = min_max
RH::arg1::min = 0.01
RH::arg1::max = 1.2
RH::filter2 = min_max
RH::arg2::soft = true
RH::arg2::min = 0.05
RH::arg2::max = 1.0

ISWR::filter1 = min_max
ISWR::arg1::min = -10
ISWR::arg1::max = 1500
ISWR::filter2 = min_max
ISWR::arg2::soft = true
ISWR::arg2::min = 0
ISWR::arg2::max = 1500

RSWR::filter1 = min_max
RSWR::arg1::min = -10
RSWR::arg1::max = 1500
RSWR::filter2 = min_max
RSWR::arg2::soft = true
RSWR::arg2::min = 0
RSWR::arg2::max = 1500

ILWR::filter1 = min_max
ILWR::arg1::min = 188
ILWR::arg1::max = 600
ILWR::filter2 = min_max
ILWR::arg2::soft = true
ILWR::arg2::min = 200
ILWR::arg2::max = 400

TSS::filter1 = min_max
TSS::arg1::min = 200
TSS::arg1::max = 320

TSG::filter1 = min_max
TSG::arg1::min = 200
TSG::arg1::max = 320

HS::filter1 = min
HS::arg1::soft = true
HS::arg1::min = 0.0
HS::filter2 = rate
HS::arg2::max = 5.55e-5 ;0.20 m/h

VW::filter1 = min_max
VW::arg1::min = -2
VW::arg1::max = 70
VW::filter2 = min_max
VW::arg2::soft = true
VW::arg2::min = 0.0
VW::arg2::max = 50.0

[Interpolations1D]
MAX_GAP_SIZE = 700200;1 day = 86400, 2 days = 172800
TA::resample1 = linear
RH::resample1 = linear
PSUM::resample1 = accumulate
PSUM::ARG1::period = 60
HS::resample1 = linear
VW::resample1 = linear
DW::resample1 = linear

[Generators]
VW::generators = CST
VW::Cst::value = 1.0
RH::generators = HUMIDITY
RH::arg1::type = RH
# TA generator with fixed values (should be good enough and not totally crazy
# for small gaps filling)
TA::generator1  = Sin
TA::arg1::type  = yearly
TA::arg1::min   = 268.26
TA::arg1::max   = 285.56
TA::arg1::phase = 0.0833
ISWR::generator1 = clearSky_SW
